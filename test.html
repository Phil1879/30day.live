<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест оплаты через WayForPay</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .fbclid-info {
            font-size: 14px;
            color: #666;
            background: #f0f0f0;
            padding: 8px 12px;
            border-radius: 8px;
            word-break: break-all;
            margin: 20px 0;
        }
        .btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover {
            background: #45a049;
        }
        .btn:disabled {
            background: #aaa;
            cursor: not-allowed;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            padding: 30px 40px;
            border-radius: 16px;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .modal-content h2 {
            margin-top: 0;
        }
        .modal-content .btn-pay {
            background: #2196F3;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 30px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
        }
        .modal-content .btn-pay:hover {
            background: #1976D2;
        }
        .modal-content .btn-close {
            background: #ccc;
            color: #333;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 10px;
        }
        .error {
            color: red;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Тест оплаты консультации</h1>
        <p>Сейчас используется <strong>fbclid</strong>:</p>
        <div class="fbclid-info" id="fbclidDisplay">—</div>

        <button class="btn" id="payButton">Записаться на консультацию</button>
        <div id="statusMessage" style="margin-top: 15px;"></div>
    </div>

    <!-- Модальное окно -->
    <div class="modal" id="paymentModal">
        <div class="modal-content">
            <h2>Перейти к оплате</h2>
            <p>Ссылка на оплату создана. Нажмите кнопку ниже, чтобы перейти на страницу WayForPay.</p>
            <a href="#" id="paymentLink" target="_blank" class="btn-pay">Перейти к оплате</a>
            <br>
            <button class="btn-close" id="closeModal">Закрыть</button>
        </div>
    </div>

    <script>
        // ================== НАСТРОЙКИ ==================
        // URL вашего вебхука в n8n (замените на реальный)
        const N8N_WEBHOOK_URL = 'https://n8n.psyhodoc.xyz/webhook/cons-invoice';
        // ===============================================

        // Получаем fbclid из URL (если есть)
        const urlParams = new URLSearchParams(window.location.search);
        let fbclid = urlParams.get('fbclid');

        // Если fbclid нет – используем тестовый (для ручного тестирования)
        if (!fbclid) {
            fbclid = 'test_fbclid_1234567890';
            console.warn('fbclid не найден в URL, используется тестовый:', fbclid);
        }

        document.getElementById('fbclidDisplay').textContent = fbclid;

        const payButton = document.getElementById('payButton');
        const statusDiv = document.getElementById('statusMessage');
        const modal = document.getElementById('paymentModal');
        const paymentLink = document.getElementById('paymentLink');
        const closeModalBtn = document.getElementById('closeModal');

        // Обработчик нажатия на кнопку
payButton.addEventListener('click', async function () {
    payButton.disabled = true;
    statusDiv.textContent = '⏳ Создаём ссылку на оплату...';
            try {
        const timestamp = Math.floor(Date.now() / 1000);
        const url = `${N8N_WEBHOOK_URL}?fbclid=${encodeURIComponent(fbclid)}&timestamp=${timestamp}`;
        const response = await fetch(url);
        if (!response.ok) throw new Error(`Ошибка ${response.status}`);
        const data = await response.json();
        const paymentUrl = data.payment_url || data.invoiceUrl;
        if (!paymentUrl) throw new Error('Ссылка на оплату не получена');
        paymentLink.href = paymentUrl;
        modal.classList.add('active');
        statusDiv.textContent = '✅ Ссылка на оплату создана!';
        statusDiv.style.color = 'green';
    } catch (error) {
        statusDiv.textContent = '❌ Ошибка: ' + error.message;
        statusDiv.style.color = 'red';
    } finally {
        payButton.disabled = false;
    }
});

        // Закрытие модального окна
        closeModalBtn.addEventListener('click', function () {
            modal.classList.remove('active');
        });

        // Закрыть модальное окно при клике вне его содержимого
        modal.addEventListener('click', function (e) {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });
    </script>
</body>
</html>
